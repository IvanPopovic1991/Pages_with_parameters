name: Maven Test CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repozitorijuma
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 3️⃣ Set ChromeDriver executable permission (Linux runner)
      - name: Set ChromeDriver executable
        run: chmod +x src/main/resources/chromedriver*

      # 4️⃣ Run Maven tests (quiet mode, batch mode)
      - name: Run Maven tests
        run: mvn -B -q clean test
        env:
          HEADLESS: true